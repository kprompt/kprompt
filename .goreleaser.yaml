# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: kprompt

before:
  hooks:
    - go mod tidy

builds:
  - id: kprompt
    main: ./cmd/kprompt
    binary: kprompt
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README*

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: kprompt
    name: kprompt
  draft: false
  prerelease: auto

brews:
  - name: kprompt
    repository:
      owner: kprompt
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://kprompt.ai"
    description: "AI CLI to control Kubernetes with natural language"
    license: "Apache-2.0"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    install: |
      bin.install "kprompt"
    test: |
      assert_match version.to_s, shell_output("#{bin}/kprompt version")
    skip_upload: '{{ eq .Env.HOMEBREW_TAP_GITHUB_TOKEN "" }}'
